<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CRM Pro - Credit Risk Management{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <script id="tailwind-config">

      theme: {
        extend: {

            "primary": "#ba0013",
            "surface-tint": "#c00014",
            "on-primary": "#ffffff",
            "background": "#f8f9fa",
            "on-background": "#191c1d",
            "surface": "#f8f9fa",
            "on-surface": "#191c1d",
            "surface-variant": "#e1e3e4",
            "on-surface-variant": "#5d3f3c",
            "outline": "#926f6b",
            "outline-variant": "#e7bdb8",
            "secondary": "#5d5e61",
            "on-secondary": "#ffffff",
            "error": "#ba1a1a",
            "on-error": "#ffffff",
            "surface-container-low": "#f3f4f5",
            "surface-container-high": "#e7e8e9",
            "surface-container-lowest": "#ffffff",
            "on-error-container": "#93000a",
            "on-secondary-container": "#636467",
            "primary-container": "#e31e24",
            "tertiary": "#006096",
            "on-primary-fixed-variant": "#93000d",
            "primary-fixed": "#ffdad6",
            "secondary-fixed-dim": "#c6c6c9",
            "on-tertiary": "#ffffff",
            "inverse-primary": "#ffb4ab",
            "on-secondary-fixed": "#1a1c1e",
            "on-tertiary-fixed-variant": "#004a76",
            "surface-container": "#edeeef",
            "on-primary-container": "#fffafa",
            "inverse-on-surface": "#f0f1f2",
            "error-container": "#ffdad6",
            "tertiary-fixed": "#cee5ff",
            "secondary-container": "#e2e2e5",
            "secondary-fixed": "#e2e2e5",
            "tertiary-container": "#2d79b2",
            "on-tertiary-fixed": "#001d33",
            "surface-dim": "#d9dadb",
            "surface-bright": "#f8f9fa",
            "inverse-surface": "#2e3132",
            "tertiary-fixed-dim": "#96cbff",
            "surface-container-highest": "#e1e3e4",
            "on-tertiary-container": "#fbfbff",
            "on-secondary-fixed-variant": "#454749",
            "primary-fixed-dim": "#ffb4ab",
            "on-primary-fixed": "#410002"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "spacing": {
            "density-comfortable": "1rem",
            "density-compact": "0.25rem",
            "gutter": "1rem",
            "nav-width": "260px",
            "margin-page": "2rem",
            "sm": "8px",
            "margin-desktop": "32px",
            "margin-mobile": "16px",
            "base": "4px",
            "lg": "24px",
            "md": "16px",
            "xl": "32px",
            "xs": "4px"
          },
          "fontFamily": {
            "body-sm": ["Inter"],
            "body-md": ["Inter"],
            "body-lg": ["Hanken Grotesk"],
            "data-tabular": ["JetBrains Mono"],
            "title-sm": ["Hanken Grotesk"],
            "label-caps": ["Inter"],
            "label-md": ["Hanken Grotesk"],
            "label-sm": ["Hanken Grotesk"],
            "headline-md": ["Hanken Grotesk"],
            "headline-sm": ["Hanken Grotesk"],
            "headline-lg": ["Hanken Grotesk"],
            "display-lg": ["Hanken Grotesk"]
          },
          "fontSize": {
            "body-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
            "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
            "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
            "data-tabular": ["13px", { "lineHeight": "16px", "fontWeight": "500" }],
            "title-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
            "label-caps": ["11px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
            "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
            "label-sm": ["11px", { "lineHeight": "14px", "fontWeight": "500" }],
            "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
            "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
            "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
            "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
          }
        }
      }
    }
  </script>

  <style>
    /* ── Side Nav Styles ── */
    :root {
      --crm-primary: #ba0013;
      --crm-primary-hover: #c00014;
      --crm-on-primary: #ffffff;
      --crm-surface-low: #f3f4f5;
      --crm-surface-high: #e7e8e9;
      --crm-surface-lowest: #ffffff;
      --crm-surface-variant: #e1e3e4;
      --crm-on-surface: #191c1d;
      --crm-on-surface-variant: #5d3f3c;
      --crm-nav-width: 260px;
    }

    .crm-side-nav {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 40;
      width: var(--crm-nav-width);
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      background: var(--crm-surface-low);
      border-right: 1px solid var(--crm-surface-variant);
    }

    .crm-side-nav__logo {
      position: absolute;
      top: 0;
      left: 0;
      padding: 16px;
      margin-bottom: 32px;
    }

    .crm-side-nav__logo img {
      height: 48px;
      margin-top: 8px;
      margin-left: 8px;
      object-fit: contain;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }

    .crm-side-nav__logo img:hover {
      opacity: 0.8;
    }

    .crm-side-nav__links {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 96px;
    }

    .crm-side-nav__link {
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      color: var(--crm-on-surface-variant);
      text-decoration: none;
      border-radius: 4px;
      font-size: 11px;
      line-height: 16px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .crm-side-nav__link:hover {
      color: var(--crm-on-surface);
      background: var(--crm-surface-high);
    }

    .crm-side-nav__link.is-active,
    .crm-side-nav__link--primary {
      color: var(--crm-on-primary);
      background: var(--crm-primary);
    }

    .crm-side-nav__link.is-active:hover,
    .crm-side-nav__link--primary:hover {
      color: var(--crm-on-primary);
      background: var(--crm-primary-hover);
    }

    .crm-side-nav__link--secondary {
      margin-top: 8px;
      color: var(--crm-primary);
      background: var(--crm-surface-lowest);
      border: 1px solid var(--crm-surface-variant);
    }

    .crm-side-nav__link-icon {
      font-size: 20px;
      flex: 0 0 auto;
    }

    .crm-side-nav__badge {
      min-width: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 6px;
      color: var(--crm-on-primary);
      background: var(--crm-primary);
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      line-height: 14px;
    }

    .crm-main-offset {
      margin-left: var(--crm-nav-width);
    }

    @media (max-width: 767px) {
      .crm-side-nav {
        position: static;
        width: 100%;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--crm-surface-variant);
      }
      .crm-side-nav__logo {
        position: static;
        padding: 0;
      }
      .crm-side-nav__links {
        margin-top: 16px;
      }
      .crm-main-offset {
        margin-left: 0;
      }
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col md:flex-row">

  <!-- Shared Sidebar -->
  <nav class="crm-side-nav" aria-label="Primary navigation">
    <div class="crm-side-nav__logo">
      <a href="/">
        <img alt="CRM Pro Logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwF7UxEiNYD9OaNYi_BDhZuxvoqvZIPNDrhJNwZp1GXjQxuvbsB1Yyr6cvCsamcMXqLa8xZDWguAKGFoanG8ohGx7fl7QXx6Kr0ElPL_Oo_mvIoHVhm63M7M1lNLHUh3rza5oIfF7W4_THRasdKoB5m-VGkGHLSUA48nIiG2pT40V72Jco79k7TTq_-QQsMTUQOX5PVQdqftpWvDSHlMslLozFDezMxaCxMMdAOlvu1AImqAb8WXPtDUh-7JK1DV_TIm9KEUK9JDY">
      </a>
    </div>

    <div class="crm-side-nav__links">
      <a class="crm-side-nav__link {% if request.path == '/' %}is-active{% endif %}" href="/">
        <span class="material-symbols-outlined crm-side-nav__link-icon" {% if request.path == '/' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>home</span>
        <span class="crm-side-nav__link-copy">Home</span>
      </a>

      <a class="crm-side-nav__link {% if request.path == '/client-directory' %}is-active{% endif %}" href="/client-directory">
        <span class="material-symbols-outlined crm-side-nav__link-icon" {% if request.path == '/client-directory' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>group</span>
        <span class="crm-side-nav__link-copy">Clients</span>
      </a>

      <a class="crm-side-nav__link {% if request.path == '/client-dashboard' %}is-active{% endif %}" href="/client-dashboard">
        <span class="material-symbols-outlined crm-side-nav__link-icon" {% if request.path == '/client-dashboard' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>dashboard</span>
        <span class="crm-side-nav__link-copy">Client Dashboard</span>
      </a>

      <a class="crm-side-nav__link {% if request.path == '/notifications' %}is-active{% endif %} flex justify-between items-center" href="/notifications">
        <div class="flex items-center gap-3">
          <span class="material-symbols-outlined crm-side-nav__link-icon" {% if request.path == '/notifications' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>notifications</span>
          <span class="crm-side-nav__link-copy">Notifications</span>
        </div>
        <span class="crm-side-nav__badge">1</span>
      </a>
    </div>

    <div class="crm-side-nav__footer mt-auto">
      <a class="crm-side-nav__link crm-side-nav__link--primary" href="#">
        <span class="material-symbols-outlined crm-side-nav__link-icon">upload_file</span>
        <span class="crm-side-nav__link-copy">Upload CSV</span>
      </a>

      <a class="crm-side-nav__link crm-side-nav__link--secondary mt-2 border border-surface-variant flex items-center gap-3 px-3 py-2 rounded bg-white text-primary font-bold hover:bg-surface-container-high" href="#">
        <span class="material-symbols-outlined crm-side-nav__link-icon">account_circle</span>
        <span class="crm-side-nav__link-copy">Account</span>
      </a>
    </div>
  </nav>

  <!-- Main Content Area -->
  <div class="crm-main-offset flex-1 flex flex-col min-h-screen overflow-hidden">
    {% block content %}{% endblock %}
  </div>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
