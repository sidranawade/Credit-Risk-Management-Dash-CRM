<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CRM Pro - Credit Risk Management{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Tailwind Config -->
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary": "#ba0013",
            "surface-tint": "#c00014",
            "on-primary": "#ffffff",
            "background": "#f8f9fa",
            "on-background": "#191c1d",
            "surface": "#f8f9fa",
            "on-surface": "#191c1d",
            "surface-variant": "#e1e3e4",
            "on-surface-variant": "#5d3f3c",
            "outline": "#926f6b",
            "outline-variant": "#e7bdb8",
            "secondary": "#5d5e61",
            "on-secondary": "#ffffff",
            "error": "#ba1a1a",
            "on-error": "#ffffff",
            "surface-container-low": "#f3f4f5",
            "surface-container-high": "#e7e8e9",
            "surface-container-lowest": "#ffffff",
            "on-error-container": "#93000a",
            "on-secondary-container": "#636467",
            "primary-container": "#e31e24",
            "tertiary": "#006096",
            "on-primary-fixed-variant": "#93000d",
            "primary-fixed": "#ffdad6",
            "secondary-fixed-dim": "#c6c6c9",
            "on-tertiary": "#ffffff",
            "inverse-primary": "#ffb4ab",
            "on-secondary-fixed": "#1a1c1e",
            "on-tertiary-fixed-variant": "#004a76",
            "surface-container": "#edeeef",
            "on-primary-container": "#fffafa",
            "inverse-on-surface": "#f0f1f2",
            "error-container": "#ffdad6",
            "tertiary-fixed": "#cee5ff",
            "secondary-container": "#e2e2e5",
            "secondary-fixed": "#e2e2e5",
            "tertiary-container": "#2d79b2",
            "on-tertiary-fixed": "#001d33",
            "surface-dim": "#d9dadb",
            "surface-bright": "#f8f9fa",
            "inverse-surface": "#2e3132",
            "tertiary-fixed-dim": "#96cbff",
            "surface-container-highest": "#e1e3e4",
            "on-tertiary-container": "#fbfbff",
            "on-secondary-fixed-variant": "#454749",
            "primary-fixed-dim": "#ffb4ab",
            "on-primary-fixed": "#410002"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "spacing": {
            "density-comfortable": "1rem",
            "density-compact": "0.25rem",
            "gutter": "1rem",
            "nav-width": "260px",
            "margin-page": "2rem",
            "sm": "8px",
            "margin-desktop": "32px",
            "margin-mobile": "16px",
            "base": "4px",
            "lg": "24px",
            "md": "16px",
            "xl": "32px",
            "xs": "4px"
          },
          "fontFamily": {
            "body-sm": ["Inter"],
            "body-md": ["Inter"],
            "body-lg": ["Inter"],
            "data-tabular": ["JetBrains Mono"],
            "title-sm": ["Inter"],
            "label-caps": ["Inter"],
            "label-md": ["Inter"],
            "label-sm": ["Inter"],
            "headline-md": ["Inter"],
            "headline-sm": ["Inter"],
            "headline-lg": ["Inter"],
            "display-lg": ["Inter"]
          },
          "fontSize": {
            "body-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
            "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
            "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
            "data-tabular": ["13px", { "lineHeight": "16px", "fontWeight": "500" }],
            "title-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
            "label-caps": ["11px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
            "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
            "label-sm": ["11px", { "lineHeight": "14px", "fontWeight": "500" }],
            "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
            "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
            "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
            "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
          }
        }
      }
    }
  </script>

  <style>
    /* ── Side Nav Styles ── */
    :root {
      --crm-primary: #ba0013;
      --crm-primary-hover: #c00014;
      --crm-on-primary: #ffffff;
      --crm-surface-low: #f3f4f5;
      --crm-surface-high: #e7e8e9;
      --crm-surface-lowest: #ffffff;
      --crm-surface-variant: #e1e3e4;
      --crm-on-surface: #191c1d;
      --crm-on-surface-variant: #5d3f3c;
      --crm-nav-width: 260px;
    }

    .crm-side-nav {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 40;
      width: var(--crm-nav-width);
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      background: var(--crm-surface-low);
      border-right: 1px solid var(--crm-surface-variant);
    }

    .crm-side-nav__logo {
      position: absolute;
      top: 0;
      left: 0;
      padding: 16px;
      margin-bottom: 32px;
    }

    .crm-side-nav__logo img {
      height: 48px;
      margin-top: 8px;
      margin-left: 8px;
      object-fit: contain;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }

    .crm-side-nav__logo img:hover {
      opacity: 0.8;
    }

    .crm-side-nav__links {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 96px;
    }

    .crm-side-nav__link {
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      color: var(--crm-on-surface-variant);
      text-decoration: none;
      border-radius: 4px;
      font-size: 11px;
      line-height: 16px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .crm-side-nav__link:hover {
      color: var(--crm-on-surface);
      background: var(--crm-surface-high);
    }

    .crm-side-nav__link.is-active,
    .crm-side-nav__link--primary {
      color: var(--crm-on-primary);
      background: var(--crm-primary);
    }

    .crm-side-nav__link.is-active:hover,
    .crm-side-nav__link--primary:hover {
      color: var(--crm-on-primary);
      background: var(--crm-primary-hover);
    }

    .crm-side-nav__link--secondary {
      margin-top: 8px;
      color: var(--crm-primary);
      background: var(--crm-surface-lowest);
      border: 1px solid var(--crm-surface-variant);
    }

    .crm-side-nav__link-icon {
      font-size: 20px;
      flex: 0 0 auto;
    }

    .crm-side-nav__badge {
      min-width: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 6px;
      color: var(--crm-on-primary);
      background: var(--crm-primary);
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      line-height: 14px;
    }

    .crm-main-offset {
      margin-left: var(--crm-nav-width);
    }

    @media (max-width: 767px) {
      .crm-side-nav {
        position: static;
        width: 100%;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--crm-surface-variant);
      }
      .crm-side-nav__logo {
        position: static;
        padding: 0;
      }
      .crm-side-nav__links {
        margin-top: 16px;
      }
      .crm-main-offset {
        margin-left: 0;
      }
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    /* ── Animations ── */
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideInBottom {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes slideInTop {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes scaleIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .animate-slide-in-left {
      animation: slideInLeft 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    .animate-slide-in-right {
      animation: slideInRight 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    .animate-slide-in-bottom {
      animation: slideInBottom 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    .animate-slide-in-top {
      animation: slideInTop 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    .animate-fade-in {
      animation: fadeIn 0.8s ease forwards;
    }

    .animate-scale-in {
      animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    /* Staggered delays */
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }
    .delay-6 { animation-delay: 0.6s; }

    /* Hover effects */
    .hover-lift {
      transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s ease;
    }
    .hover-lift:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    }

    .nav-link-hover {
      position: relative;
    }
    .nav-link-hover::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 12px;
      right: 12px;
      height: 2px;
      background: var(--crm-primary);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }
    .nav-link-hover:hover::after {
      transform: scaleX(1);
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col md:flex-row">

  <!-- Shared Sidebar -->
  <nav class="crm-side-nav" aria-label="Primary navigation">
    <div class="crm-side-nav__logo">
      <a href="/">
        <img alt="CRM Pro Logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwF7UxEiNYD9OaNYi_BDhZuxvoqvZIPNDrhJNwZp1GXjQxuvbsB1Yyr6cvCsamcMXqLa8xZDWguAKGFoanG8ohGx7fl7QXx6Kr0ElPL_Oo_mvIoHVhm63M7M1lNLHUh3rza5oIfF7W4_THRasdKoB5m-VGkGHLSUA48nIiG2pT40V72Jco79k7TTq_-QQsMTUQOX5PVQdqftpWvDSHlMslLozFDezMxaCxMMdAOlvu1AImqAb8WXPtDUh-7JK1DV_TIm9KEUK9JDY">
      </a>
    </div>

    <div class="crm-side-nav__links">
      <a class="crm-side-nav__link animate-slide-in-left delay-1 {% if request.path == '/' %}is-active{% endif %}" href="/">
        <span class="material-symbols-outlined crm-side-nav__link-icon" {% if request.path == '/' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>home</span>
        <span class="crm-side-nav__link-copy">Home</span>
      </a>

      <a class="crm-side-nav__link animate-slide-in-left delay-2 {% if request.path == '/client-directory' %}is-active{% endif %}" href="/client-directory">
        <span class="material-symbols-outlined crm-side-nav__link-icon" {% if request.path == '/client-directory' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>group</span>
        <span class="crm-side-nav__link-copy">Clients</span>
      </a>

      <a class="crm-side-nav__link animate-slide-in-left delay-3 {% if request.path == '/client-dashboard' %}is-active{% endif %}" href="/client-dashboard">
        <span class="material-symbols-outlined crm-side-nav__link-icon" {% if request.path == '/client-dashboard' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>dashboard</span>
        <span class="crm-side-nav__link-copy">Client Dashboard</span>
      </a>

      <a class="crm-side-nav__link animate-slide-in-left delay-4 {% if request.path == '/notifications' %}is-active{% endif %} flex justify-between items-center" href="/notifications">
        <div class="flex items-center gap-3">
          <span class="material-symbols-outlined crm-side-nav__link-icon" {% if request.path == '/notifications' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>notifications</span>
          <span class="crm-side-nav__link-copy">Notifications</span>
        </div>
        <span class="crm-side-nav__badge">1</span>
      </a>
    </div>

    <div class="crm-side-nav__footer mt-auto">
      <a class="crm-side-nav__link animate-slide-in-left delay-5 crm-side-nav__link--primary" href="#">
        <span class="material-symbols-outlined crm-side-nav__link-icon">upload_file</span>
        <span class="crm-side-nav__link-copy">Upload Excel</span>
      </a>

      <a class="crm-side-nav__link crm-side-nav__link--secondary mt-2 border border-surface-variant flex items-center gap-3 px-3 py-2 rounded bg-white text-primary font-bold hover:bg-surface-container-high" href="#">
        <span class="material-symbols-outlined crm-side-nav__link-icon">account_circle</span>
        <span class="crm-side-nav__link-copy">Account</span>
      </a>
    </div>
  </nav>

  <!-- Main Content Area -->
  <div class="crm-main-offset flex-1 flex flex-col min-h-screen overflow-hidden">
    {% block content %}{% endblock %}
  </div>

  <!-- Register Company Modal -->
  <div id="registerCompanyModal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
      <div class="fixed inset-0 transition-opacity bg-black bg-opacity-50" aria-hidden="true" onclick="closeRegisterModal()"></div>
      <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
      <div class="inline-block overflow-hidden text-left align-bottom transition-all transform bg-white rounded-lg shadow-xl sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
        <div class="px-6 py-4 border-b border-surface-variant flex justify-between items-center">
          <h3 class="text-headline-sm font-bold text-on-surface" id="modal-title">Register New Company</h3>
          <button type="button" class="text-secondary hover:text-on-surface transition-colors" onclick="closeRegisterModal()">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <form id="registerCompanyForm" class="px-6 py-4 space-y-4">
          <div>
            <label for="companyName" class="block text-label-md font-semibold text-secondary mb-1 uppercase">Company Name</label>
            <input type="text" id="companyName" name="companyName" class="w-full px-3 py-2 border border-surface-variant rounded bg-surface-container-low text-on-surface focus:outline-none focus:border-primary" placeholder="Enter company name" required>
          </div>
          <div>
            <label for="industry" class="block text-label-md font-semibold text-secondary mb-1 uppercase">Industry</label>
            <input type="text" id="industry" name="industry" class="w-full px-3 py-2 border border-surface-variant rounded bg-surface-container-low text-on-surface focus:outline-none focus:border-primary" placeholder="e.g. Manufacturing, Tech" required>
          </div>
          <div>
            <label for="location" class="block text-label-md font-semibold text-secondary mb-1 uppercase">Location</label>
            <input type="text" id="location" name="location" class="w-full px-3 py-2 border border-surface-variant rounded bg-surface-container-low text-on-surface focus:outline-none focus:border-primary" placeholder="City, Country" required>
          </div>
          <div>
            <label for="pincode" class="block text-label-md font-semibold text-secondary mb-1 uppercase">Pincode</label>
            <input type="text" id="pincode" name="pincode" class="w-full px-3 py-2 border border-surface-variant rounded bg-surface-container-low text-on-surface focus:outline-none focus:border-primary" placeholder="Enter Pincode" required>
          </div>
          <div>
            <label for="salesAmount" class="block text-label-md font-semibold text-secondary mb-1 uppercase">Sales Amount</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-secondary">$</span>
              <input type="number" id="salesAmount" name="salesAmount" class="w-full pl-7 pr-3 py-2 border border-surface-variant rounded bg-surface-container-low text-on-surface focus:outline-none focus:border-primary" placeholder="0.00" required>
            </div>
          </div>
          <div>
            <label for="riskScore" class="block text-label-md font-semibold text-secondary mb-1 uppercase">Risk Score</label>
            <select id="riskScore" name="riskScore" class="w-full px-3 py-2 border border-surface-variant rounded bg-surface-container-low text-on-surface focus:outline-none focus:border-primary">
              <option value="Low">Low</option>
              <option value="Med">Medium</option>
              <option value="High">High</option>
            </select>
          </div>
          <div>
            <label for="excelFile" class="block text-label-md font-semibold text-secondary mb-1 uppercase">Upload Excel File</label>
            <input type="file" id="excelFile" name="excelFile" accept=".xlsx, .xls" class="w-full px-3 py-2 border border-surface-variant rounded bg-surface-container-low text-on-surface focus:outline-none focus:border-primary file:mr-4 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-label-sm file:font-semibold file:bg-primary/10 file:text-primary hover:file:bg-primary/20 cursor-pointer">
          </div>
          <div class="pt-4 flex justify-end gap-3">
            <button type="button" class="px-4 py-2 text-on-surface-variant font-semibold hover:bg-surface-container-high rounded transition-colors" onclick="closeRegisterModal()">Cancel</button>
            <button type="submit" class="px-6 py-2 bg-primary text-on-primary font-semibold rounded shadow-sm hover:bg-surface-tint transition-colors">Register Company</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    function openRegisterModal() {
      document.getElementById('registerCompanyModal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeRegisterModal() {
      document.getElementById('registerCompanyModal').classList.add('hidden');
      document.body.style.overflow = '';
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Handle Register Company buttons
      document.addEventListener('click', (e) => {
        if (e.target.closest('#registerCompanyBtn')) {
          openRegisterModal();
        }
      });

      // Handle form submission
      const form = document.getElementById('registerCompanyForm');
      if (form) {
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          // In a real app, you'd send this data to the server
          const formData = new FormData(form);
          console.log('Registering Company:', Object.fromEntries(formData));
          alert('Company registration submitted successfully!');
          closeRegisterModal();
          form.reset();
        });
      }
    });
  </script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
