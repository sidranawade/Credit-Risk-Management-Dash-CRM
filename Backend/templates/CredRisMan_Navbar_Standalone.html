<!DOCTYPE html>

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- Link to CRMPro Blueprint Stylesheet -->
  <link rel="stylesheet" href="/static/css/blueprint_styles.css">
</head>
<body class="theme-user">
  <aside class="app-sidebar animate-slide-sidebar" id="app-sidebar">
    <div class="sidebar-logo">
      <img
        alt="CRM Pro Logo"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwF7UxEiNYD9OaNYi_BDhZuxvoqvZIPNDrhJNwZp1GXjQxuvbsB1Yyr6cvCsamcMXqLa8xZDWguAKGFoanG8ohGx7fl7QXx6Kr0ElPL_Oo_mvIoHVhm63M7M1lNLHUh3rza5oIfF7W4_THRasdKoB5m-VGkGHLSUA48nIiG2pT40V72Jco79k7TTq_-QQsMTUQOX5PVQdqftpWvDSHlMslLozFDezMxaCxMMdAOlvu1AImqAb8WXPtDUh-7JK1DV_TIm9KEUK9JDY">
    </div>

    <div class="sidebar-menu">
      <a class="menu-link active" href="/">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
        <span>Home</span>
      </a>

      <a class="menu-link" href="/client-directory">
        <span class="material-symbols-outlined">group</span>
        <span>Clients</span>
      </a>

      <a class="menu-link" href="/client-dashboard">
        <span class="material-symbols-outlined">dashboard</span>
        <span>Client Dashboard</span>
      </a>

      <a class="menu-link flex justify-between items-center" href="/notifications" style="display: flex;">
        <div style="display: flex; align-items: center; gap: 16px;">
          <span class="material-symbols-outlined">notifications</span>
          <span>Notifications</span>
        </div>
        <span class="pill pill-danger" style="padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 700; text-transform: none;">1</span>
      </a>
    </div>

    <div class="sidebar-footer">
      <a class="menu-link" href="#" style="background: var(--color-primary); color: #fff; justify-content: center; margin-bottom: 8px; box-shadow: var(--shadow-sm);">
        <span class="material-symbols-outlined">upload_file</span>
        <span>Upload Excel</span>
      </a>

      <a class="menu-link" href="#" style="border: 1px solid var(--color-border); justify-content: center;">
        <span class="material-symbols-outlined">account_circle</span>
        <span>Account</span>
      </a>
    </div>
  </aside>

  <main class="main-container">
    <h1 class="text-on-surface">Page content goes here</h1>
  </main>

  <script src="/static/js/blueprint_scripts.js"></script>
