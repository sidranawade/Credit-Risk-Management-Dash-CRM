<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CRM Pro - Credit Risk Management{% endblock %}</title>

  <!-- External Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Tailwind Config -->
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary": "#ba0013",
            "surface-tint": "#c00014",
            "on-primary": "#ffffff",
            "background": "#f5f7fb",
            "on-background": "#071635",
            "surface": "#ffffff",
            "on-surface": "#071635",
            "surface-variant": "#f8fafc",
            "on-surface-variant": "#64748b",
            "outline": "#e2e7f1",
            "outline-variant": "#cbd5e1",
            "secondary": "#64748b",
            "on-secondary": "#ffffff",
            "error": "#ef4444",
            "on-error": "#ffffff",
            "surface-container-low": "#f8fafc",
            "surface-container-high": "#e2e7f1",
            "surface-container-lowest": "#ffffff",
            "on-error-container": "#b91c1c",
            "on-secondary-container": "#071635",
            "primary-container": "#fff0f0",
            "tertiary": "#2563eb",
            "on-primary-fixed-variant": "#dc2626",
            "primary-fixed": "#fecaca",
            "secondary-fixed-dim": "#94a3b8",
            "on-tertiary": "#ffffff",
            "inverse-primary": "#fecaca",
            "on-secondary-fixed": "#071635",
            "on-tertiary-fixed-variant": "#1d4ed8",
            "surface-container": "#f1f5f9",
            "on-primary-container": "#ba0013",
            "inverse-on-surface": "#f5f7fb",
            "error-container": "#fee2e2",
            "tertiary-fixed": "#bfdbfe",
            "secondary-container": "#e2e7f1",
            "secondary-fixed": "#e2e7f1",
            "tertiary-container": "#eff6ff",
            "on-tertiary-fixed": "#1e3a8a",
            "surface-dim": "#cbd5e1",
            "surface-bright": "#ffffff",
            "inverse-surface": "#071635",
            "tertiary-fixed-dim": "#bfdbfe",
            "surface-container-highest": "#cbd5e1",
            "on-tertiary-container": "#2563eb",
            "on-secondary-fixed-variant": "#64748b",
            "primary-fixed-dim": "#fecaca",
            "on-primary-fixed": "#ba0013"
          },
          "borderRadius": {
            "DEFAULT": "10px",
            "lg": "12px",
            "xl": "16px",
            "full": "999px"
          },
          "spacing": {
            "density-comfortable": "1rem",
            "density-compact": "0.25rem",
            "gutter": "1rem",
            "nav-width": "260px",
            "margin-page": "2rem",
            "sm": "8px",
            "margin-desktop": "30px",
            "margin-mobile": "16px",
            "base": "4px",
            "lg": "24px",
            "md": "16px",
            "xl": "32px",
            "xs": "4px"
          }
        }
      }
    }
  </script>

  <!-- Blueprint Styles -->
  <link rel="stylesheet" href="/static/css/blueprint_styles.css">

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="theme-user">

  <!-- Mobile Header (Only visible on screens <= 1024px) -->
  <header class="mobile-header">
    <div style="font-weight: 800; font-size: 1.25rem; color: var(--color-primary);">CRM Pro</div>
    <button class="hamburger-btn" id="mobile-hamburger" aria-expanded="false" aria-controls="app-sidebar" aria-label="Toggle Navigation Menu">
      <span class="material-symbols-outlined">menu</span>
    </button>
  </header>

  <div class="page-wrapper">
    
    <!-- Sidebar Navigation -->
    <aside class="app-sidebar animate-slide-sidebar" id="app-sidebar">
      
      <!-- Sidebar Brand Logo -->
      <div class="sidebar-logo">
        <a href="/">
          <img alt="CRM Pro Logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwF7UxEiNYD9OaNYi_BDhZuxvoqvZIPNDrhJNwZp1GXjQxuvbsB1Yyr6cvCsamcMXqLa8xZDWguAKGFoanG8ohGx7fl7QXx6Kr0ElPL_Oo_mvIoHVhm63M7M1lNLHUh3rza5oIfF7W4_THRasdKoB5m-VGkGHLSUA48nIiG2pT40V72Jco79k7TTq_-QQsMTUQOX5PVQdqftpWvDSHlMslLozFDezMxaCxMMdAOlvu1AImqAb8WXPtDUh-7JK1DV_TIm9KEUK9JDY">
        </a>
      </div>

      <!-- Navigation Links -->
      <nav class="sidebar-menu">
        <a class="menu-link {% if request.path == '/' %}active{% endif %}" href="/">
          <span class="material-symbols-outlined" {% if request.path == '/' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>home</span>
          <span>Home</span>
        </a>

        <a class="menu-link {% if request.path == '/client-directory' %}active{% endif %}" href="/client-directory">
          <span class="material-symbols-outlined" {% if request.path == '/client-directory' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>group</span>
          <span>Clients</span>
        </a>

        <a class="menu-link {% if request.path == '/client-dashboard' %}active{% endif %}" href="/client-dashboard">
          <span class="material-symbols-outlined" {% if request.path == '/client-dashboard' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>dashboard</span>
          <span>Client Dashboard</span>
        </a>

        <a class="menu-link {% if request.path == '/notifications' %}active{% endif %} flex justify-between items-center" href="/notifications">
          <div style="display: flex; align-items: center; gap: 16px;">
            <span class="material-symbols-outlined" {% if request.path == '/notifications' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>notifications</span>
            <span>Notifications</span>
          </div>
          <span class="pill pill-danger" style="padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 700; text-transform: none;">1</span>
        </a>
      </nav>

      <!-- Sidebar Account Profile Footer -->
      <div class="sidebar-footer">
        <a class="menu-link" href="#" style="background: var(--color-primary); color: #fff; justify-content: center; margin-bottom: 8px; box-shadow: var(--shadow-sm);" id="uploadExcelBtn">
          <span class="material-symbols-outlined">upload_file</span>
          <span>Upload Excel</span>
        </a>
        <a class="menu-link" href="#" style="border: 1px solid var(--color-border); justify-content: center;">
          <span class="material-symbols-outlined">account_circle</span>
          <span>Account</span>
        </a>
      </div>

    </aside>

    <!-- Main Content Area -->
    <main class="main-container animate-fade-slide">
      {% block content %}{% endblock %}
    </main>

  </div>

  <!-- Register Company Modal -->
  <div class="modal-backdrop" id="registerCompanyModal" aria-hidden="true" role="dialog">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="text-headline-sm font-bold text-on-surface" id="modal-title">Register New Company</h3>
        <button type="button" class="modal-close" onclick="closeRegisterModal()" aria-label="Close Dialog">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <form id="registerCompanyForm" class="modal-body">
        <div class="form-group">
          <label for="companyName" class="form-label">Company Name</label>
          <input type="text" id="companyName" name="companyName" class="form-control" placeholder="Enter company name" required>
        </div>
        <div class="form-group">
          <label for="industry" class="form-label">Industry</label>
          <input type="text" id="industry" name="industry" class="form-control" placeholder="e.g. Manufacturing, Tech" required>
        </div>
        <div class="form-group">
          <label for="location" class="form-label">Location</label>
          <input type="text" id="location" name="location" class="form-control" placeholder="City, Country" required>
        </div>
        <div class="form-group">
          <label for="pincode" class="form-label">Pincode</label>
          <input type="text" id="pincode" name="pincode" class="form-control" placeholder="Enter Pincode" required>
        </div>
        <div class="form-group">
          <label for="salesAmount" class="form-label">Sales Amount</label>
          <div style="position: relative; display: flex; align-items: center;">
            <span style="position: absolute; left: 16px; color: var(--color-text-secondary);">$</span>
            <input type="number" id="salesAmount" name="salesAmount" class="form-control" style="padding-left: 32px;" placeholder="0.00" required>
          </div>
        </div>
        <div class="form-group">
          <label for="riskScore" class="form-label">Risk Score</label>
          <select id="riskScore" name="riskScore" class="form-control">
            <option value="Low">Low</option>
            <option value="Med">Medium</option>
            <option value="High">High</option>
          </select>
        </div>
        <div class="form-group">
          <label for="excelFile" class="form-label">Upload Excel File</label>
          <input type="file" id="excelFile" name="excelFile" accept=".xlsx, .xls" class="form-control file:mr-4 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-label-sm file:font-semibold file:bg-primary/10 file:text-primary hover:file:bg-primary/20 cursor-pointer" style="padding: 8px 12px;">
        </div>
        
        <div class="modal-footer" style="padding: 20px 0 0 0; border-top: 1px solid var(--color-border); margin-top: 20px;">
          <button type="button" class="btn btn-secondary" onclick="closeRegisterModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Register Company</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Javascript Component Controllers -->
  <script src="/static/js/blueprint_scripts.js"></script>
  <script>
    function openRegisterModal() {
      const modal = document.getElementById('registerCompanyModal');
      if (modal) {
        modal.classList.add('show');
        modal.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
        const modalBox = modal.querySelector('.modal-box');
        if (modalBox) {
          modalBox.classList.add('animate-fade-scale');
        }
      }
    }

    function closeRegisterModal() {
      const modal = document.getElementById('registerCompanyModal');
      if (modal) {
        modal.classList.remove('show');
        modal.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Handle Register Company buttons
      document.addEventListener('click', (e) => {
        if (e.target.closest('#registerCompanyBtn')) {
          openRegisterModal();
        }
      });

      // Handle form submission
      const form = document.getElementById('registerCompanyForm');
      if (form) {
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          const formData = new FormData(form);
          console.log('Registering Company:', Object.fromEntries(formData));
          alert('Company registration submitted successfully!');
          closeRegisterModal();
          form.reset();
        });
      }
    });
  </script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
